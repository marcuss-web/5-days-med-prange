<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👹 Five Nights with Rasmus 👹</title>
    <link rel="icon" href="data:,">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; padding: 20px; }
        
        .game-container { max-width: 950px; width: 100%; background: #0a0a0a; border-radius: 20px; padding: 15px; border: 3px solid #1a1a1a; box-shadow: 0 0 60px rgba(0,0,0,0.9); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: #888; }
        .night-text { font-size: 1.2rem; background: #111; padding: 5px 15px; border-radius: 8px; border: 1px solid #333; }
        .time-text { font-size: 2rem; color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .power-container { display: flex; align-items: center; gap: 8px; }
        .power-text { color: #ff4444; }
        .power-bar { width: 120px; height: 14px; background: #1a1a1a; border-radius: 7px; overflow: hidden; border: 1px solid #ff4444; }
        .power-fill { height: 100%; background: #ff4444; width: 100%; transition: width 0.3s; }
        
        .office-container { position: relative; margin-bottom: 10px; }
        .office-bg { width: 100%; height: 320px; object-fit: cover; border-radius: 12px; border: 3px solid #222; filter: brightness(0.25) grayscale(0.4); }
        
        .door-area { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(10,10,10,0.85); padding: 10px 25px; border-radius: 40px; border: 2px solid #444; backdrop-filter: blur(5px); }
        .door-btn { background: #2a2a2a; border: 2px solid #666; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.1s; box-shadow: 0 4px 0 #1a1a1a; }
        .door-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a1a1a; }
        .door-btn.active { background: #00aa00; border-color: #00ff00; box-shadow: 0 0 15px #00ff00, 0 4px 0 #006600; }
        .light-btn { background: #2a2a2a; border: 2px solid #666; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.1s; box-shadow: 0 4px 0 #1a1a1a; }
        .light-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a1a1a; }
        .light-btn.active { background: #ff8800; border-color: #ffcc00; box-shadow: 0 0 15px #ffcc00, 0 4px 0 #aa5500; }
        
        .rasmus-door { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); width: 130px; height: 130px; object-fit: cover; border-radius: 12px; border: 3px solid red; box-shadow: 0 0 30px red; display: none; animation: rasmusAppear 0.3s; }
        @keyframes rasmusAppear { from { opacity: 0; transform: translateX(-50%) scale(0.8); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
        
        .computer-screen { background: #0a0a0a; border-radius: 15px; padding: 15px; border: 4px solid #1a1a1a; margin-top: 10px; position: relative; }
        .computer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: #888; }
        .computer-title { color: #00ff88; text-shadow: 0 0 5px #00ff88; }
        
        .camera-map { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .camera-room { background: #111; border: 2px solid #444; border-radius: 8px; padding: 12px 4px; color: #aaa; text-align: center; font-size: 0.7rem; cursor: pointer; position: relative; transition: all 0.1s; }
        .camera-room.active { border-color: #00ff88; box-shadow: 0 0 10px #00ff88; }
        
        .camera-view { display: flex; gap: 15px; }
        .camera-image { flex: 1; height: 170px; object-fit: cover; border-radius: 8px; border: 2px solid #444; filter: brightness(0.3) grayscale(0.4); }
        .camera-controls { width: 140px; }
        .camera-btn { width: 100%; padding: 10px; margin-bottom: 8px; background: #1a1a1a; border: 2px solid #444; border-radius: 8px; color: white; cursor: pointer; font-size: 0.85rem; transition: all 0.1s; box-shadow: 0 3px 0 #0a0a0a; }
        .camera-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #0a0a0a; }
        
        .hidden { display: none !important; }
        
        .gameover-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 999; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .gameover-text { color: red; font-size: 4rem; margin-bottom: 30px; text-shadow: 0 0 20px red; }
        .jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: red; z-index: 998; display: none; justify-content: center; align-items: center; animation: flash 0.3s; }
        .jumpscare img { width: 450px; height: 450px; object-fit: cover; border-radius: 20px; border: 5px solid black; }
        @keyframes flash { 0%,100%{ background: red; } 50%{ background: darkred; } }
        
        .menu-screen { position: relative; width: 100%; max-width: 900px; height: 500px; background: url('https://imgur.com/nVo7Mr1.jpg') center/cover; border-radius: 20px; overflow: hidden; border: 4px solid #222; }
        .menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .menu-title { font-size: 3.5rem; color: #ff0000; text-shadow: 0 0 30px red; margin-bottom: 20px; font-weight: bold; }
        .menu-rasmus { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; border: 4px solid red; box-shadow: 0 0 50px red; margin-bottom: 30px; }
        .start-btn { padding: 15px 45px; background: #cc0000; border: none; border-radius: 10px; color: white; font-size: 1.6rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #660000; transition: all 0.1s; }
        .start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #660000; }
        
        .warning-text { color: #ff4444; text-align: center; margin: 5px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

<!-- MENU -->
<div id="menuScreen" class="menu-screen">
    <div class="menu-overlay">
        <div class="menu-title">FIVE NIGHTS</div>
        <img class="menu-rasmus" src="https://imgur.com/G4CZuhM.jpg" alt="Rasmus">
        <div class="menu-title" style="font-size: 2.8rem;">WITH RASMUS</div>
        <button class="start-btn" id="startBtn">START NAT 1</button>
    </div>
</div>

<!-- SPIL -->
<div id="gameContainer" class="game-container hidden">
    <div class="top-bar">
        <div class="night-text">🌙 NAT <span id="nightDisplay">1</span></div>
        <div class="time-text" id="timeDisplay">12:00 AM</div>
        <div class="power-container">
            <span class="power-text">🔋 <span id="powerPercent">100</span>%</span>
            <div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
        </div>
    </div>
    
    <!-- KONTOR -->
    <div class="office-container">
        <img class="office-bg" src="https://imgur.com/nVo7Mr1.jpg" alt="Kontor">
        <div class="door-area">
            <button class="door-btn" id="doorBtn">🚪 DØR</button>
            <button class="light-btn" id="lightBtn">💡 LYS</button>
        </div>
        <img class="rasmus-door" src="https://imgur.com/G4CZuhM.jpg" alt="Rasmus" id="rasmusDoor">
    </div>
    
    <div class="warning-text">💻 Tryk C for at åbne computer (kamera)</div>
    
    <!-- COMPUTER SKÆRM -->
    <div id="computerScreen" class="computer-screen hidden">
        <div class="computer-header">
            <span class="computer-title">📷 KAMERA SYSTEM</span>
            <button class="camera-btn" id="closeComputerBtn" style="width: auto; padding: 6px 15px;">LUK</button>
        </div>
        
        <div id="cameraMap" class="camera-map"></div>
        
        <div class="camera-view">
            <img class="camera-image" id="cameraImage" src="">
            <div class="camera-controls">
                <button class="camera-btn" id="playSoundBtn">🔊 LYD</button>
                <div style="color: #888; font-size: 0.7rem; margin-top: 5px;">Lok Rasmus væk</div>
            </div>
        </div>
    </div>
</div>

<!-- GAME OVER -->
<div id="gameoverScreen" class="gameover-screen">
    <div class="gameover-text">💀 GAME OVER 💀</div>
    <button class="start-btn" id="restartBtn">PRØV IGEN</button>
</div>

<!-- JUMP SCARE -->
<div id="jumpscareScreen" class="jumpscare">
    <img src="https://imgur.com/G4CZuhM.jpg" alt="Rasmus">
</div>

<script>
    const IMAGES = {
        office: 'https://imgur.com/nVo7Mr1.jpg', rasmus: 'https://imgur.com/G4CZuhM.jpg',
        scene: 'https://imgur.com/r0Qx608.jpg', gang1: 'https://imgur.com/RVy04Qn.jpg', gang2: 'https://imgur.com/Lx6Qn86.jpg',
        kantine: 'https://imgur.com/r0Qx608.jpg', trappe: 'https://imgur.com/3iPixEm.jpg', toilet: 'https://imgur.com/Ltatxyg.jpg',
        biblio: 'https://imgur.com/YIfzseW.jpg', udenfor: 'https://imgur.com/vcQPODA.jpg', kontor: 'https://imgur.com/nllrJB0.jpg'
    };
    
    let gameActive = false, night = 1, timeHour = 0, power = 100, computerOpen = false;
    let rasmusRoom = 'kontor', doorClosed = false, lightOn = false, soundCooldown = 0;
    let gameInterval, rasmusInterval;
    
    const CONNECTIONS = {
        'scene': ['gang1'], 'gang1': ['scene', 'gang2', 'kantine'], 'gang2': ['gang1', 'trappe', 'toilet'],
        'kantine': ['gang1', 'biblio'], 'trappe': ['gang2', 'udenfor'], 'toilet': ['gang2'],
        'biblio': ['kantine'], 'udenfor': ['trappe', 'kontor'], 'kontor': ['udenfor']
    };
    
    const ROOMS = ['scene', 'gang1', 'gang2', 'kantine', 'trappe', 'toilet', 'biblio', 'udenfor', 'kontor'];
    const ROOM_NAMES = { scene:'SCENE', gang1:'GANG 1', gang2:'GANG 2', kantine:'KANTINE', trappe:'TRAPPE', toilet:'TOILET', biblio:'BIBLIO', udenfor:'UDENFOR', kontor:'KONTOR' };
    
    const menuScreen = document.getElementById('menuScreen'), gameContainer = document.getElementById('gameContainer');
    const gameoverScreen = document.getElementById('gameoverScreen'), jumpscareScreen = document.getElementById('jumpscareScreen');
    const nightDisplay = document.getElementById('nightDisplay'), timeDisplay = document.getElementById('timeDisplay');
    const powerPercent = document.getElementById('powerPercent'), powerFill = document.getElementById('powerFill');
    const computerScreen = document.getElementById('computerScreen'), cameraMap = document.getElementById('cameraMap');
    const cameraImage = document.getElementById('cameraImage'), rasmusDoor = document.getElementById('rasmusDoor');
    const doorBtn = document.getElementById('doorBtn'), lightBtn = document.getElementById('lightBtn');
    
    function updateUI() {
        powerPercent.textContent = Math.floor(power); powerFill.style.width = power + '%';
        let h = Math.floor(timeHour), m = Math.floor((timeHour - h) * 60);
        timeDisplay.textContent = `${h % 12 || 12}:${m.toString().padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
        doorBtn.classList.toggle('active', doorClosed); lightBtn.classList.toggle('active', lightOn);
    }
    
    function drainPower() { 
        let d = 0.5; if (doorClosed) d += 1.5; if (lightOn) d += 0.5; if (computerOpen) d += 0.8; 
        power = Math.max(0, power - d/10); 
        if (power <= 0) { doorClosed = lightOn = computerOpen = false; computerScreen.classList.add('hidden'); } 
        updateUI(); 
    }
    
    function moveRasmus() {
        if (!gameActive) return;
        let connections = CONNECTIONS[rasmusRoom] || [];
        if (connections.length > 0) { rasmusRoom = connections[Math.floor(Math.random() * connections.length)]; }
        
        let atDoor = (rasmusRoom === 'gang1' || rasmusRoom === 'gang2');
        rasmusDoor.style.display = (atDoor && !doorClosed) ? 'block' : 'none';
        
        if (atDoor && !doorClosed && !computerOpen) gameOver();
        if (computerOpen) cameraImage.src = IMAGES[rasmusRoom] || IMAGES.scene;
    }
    
    function gameOver() { 
        gameActive = false; clearInterval(gameInterval); clearInterval(rasmusInterval); 
        jumpscareScreen.style.display = 'flex'; 
        setTimeout(() => { jumpscareScreen.style.display = 'none'; gameoverScreen.style.display = 'flex'; }, 800); 
    }
    
    function renderCameraMap() {
        cameraMap.innerHTML = '';
        ROOMS.forEach(room => {
            let btn = document.createElement('div'); 
            btn.className = 'camera-room';
            btn.textContent = ROOM_NAMES[room];
            btn.addEventListener('click', () => { cameraImage.src = IMAGES[room] || IMAGES.scene; });
            cameraMap.appendChild(btn);
        });
    }
    
    document.getElementById('startBtn').addEventListener('click', () => { night = 1; startNight(); });
    document.getElementById('restartBtn').addEventListener('click', () => { gameoverScreen.style.display = 'none'; startNight(); });
    
    function startNight() {
        gameActive = true; timeHour = 0; power = 100; rasmusRoom = 'kontor'; 
        doorClosed = lightOn = computerOpen = false; rasmusDoor.style.display = 'none'; computerScreen.classList.add('hidden');
        menuScreen.classList.add('hidden'); gameContainer.classList.remove('hidden'); gameoverScreen.style.display = 'none';
        nightDisplay.textContent = night; updateUI(); renderCameraMap();
        if (gameInterval) clearInterval(gameInterval); if (rasmusInterval) clearInterval(rasmusInterval);
        gameInterval = setInterval(() => { if (!gameActive) return; timeHour += 0.005; drainPower(); if (soundCooldown > 0) soundCooldown--; if (timeHour >= 6) { gameActive = false; alert('🎉 DU OVERLEVEDE! 🎉'); menuScreen.classList.remove('hidden'); gameContainer.classList.add('hidden'); } updateUI(); }, 100);
        rasmusInterval = setInterval(() => moveRasmus(), 5000);
    }
    
    doorBtn.addEventListener('click', () => { if (power > 0) { doorClosed = !doorClosed; if (doorClosed) rasmusDoor.style.display = 'none'; updateUI(); } });
    lightBtn.addEventListener('click', () => { lightOn = !lightOn; updateUI(); });
    
    document.addEventListener('keydown', (e) => { 
        if (!gameActive) return; 
        if (e.key === 'c' || e.key === 'C') { 
            computerOpen = !computerOpen; 
            computerScreen.classList.toggle('hidden', !computerOpen); 
            if (computerOpen) cameraImage.src = IMAGES[rasmusRoom] || IMAGES.scene; 
        } 
    });
    
    document.getElementById('closeComputerBtn').addEventListener('click', () => { computerOpen = false; computerScreen.classList.add('hidden'); });
    document.getElementById('playSoundBtn').addEventListener('click', () => { if (soundCooldown > 0) return; soundCooldown = 15; let connections = CONNECTIONS[rasmusRoom] || []; if (connections.length > 0) { rasmusRoom = connections[Math.floor(Math.random() * connections.length)]; } if (computerOpen) cameraImage.src = IMAGES[rasmusRoom] || IMAGES.scene; });
</script>
</body>
</html>
