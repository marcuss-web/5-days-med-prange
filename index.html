<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👹 Five Nights with Rasmus Prange 👹</title>
    <link rel="icon" href="data:,">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000000; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; padding: 20px; }
        
        .game-container { max-width: 1000px; width: 100%; background: #0a0a0a; border-radius: 20px; padding: 20px; border: 3px solid #333; box-shadow: 0 0 60px rgba(0,0,0,0.9); }
        
        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: #888; }
        .night-display { font-size: 1.5rem; background: #111; padding: 5px 15px; border-radius: 10px; border: 1px solid #444; }
        .time-display { font-size: 2rem; font-weight: bold; color: #00ff88; text-shadow: 0 0 10px #00ff88; background: #111; padding: 5px 20px; border-radius: 10px; border: 1px solid #00ff88; }
        .power-display { font-size: 1.2rem; color: #ff4444; }
        .power-bar { width: 150px; height: 15px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #ff4444; }
        .power-fill { height: 100%; background: #ff4444; width: 100%; transition: width 0.3s; }
        
        /* MAIN VIEW - KONTOR */
        .office-view { position: relative; margin-bottom: 15px; }
        .office-img { width: 100%; height: 280px; object-fit: cover; border-radius: 10px; border: 2px solid #333; filter: brightness(0.4) grayscale(0.3); }
        
        /* LEKTIE OVERLAY */
        .homework-overlay { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 2px solid #00ff88; border-radius: 15px; padding: 15px 30px; display: flex; align-items: center; gap: 20px; }
        .homework-text { color: #00ff88; font-size: 1.3rem; font-weight: bold; text-shadow: 0 0 10px #00ff88; }
        .homework-btn { background: #00ff88; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .homework-btn:active { transform: scale(0.95); }
        
        /* RASMUS I KONTORET */
        .rasmus-office { position: absolute; bottom: 20px; right: 20px; width: 100px; height: 100px; object-fit: cover; border-radius: 10px; border: 2px solid red; box-shadow: 0 0 20px red; display: none; }
        
        /* KAMERA PANEL - FNAF EPSTEIN STYLE */
        .camera-panel { background: #0a0a0a; border: 2px solid #333; border-radius: 10px; padding: 15px; margin-top: 10px; }
        .camera-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: #888; }
        .camera-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .camera-btn { background: #1a1a1a; border: 2px solid #444; border-radius: 8px; padding: 12px 5px; color: #aaa; cursor: pointer; text-align: center; font-size: 0.8rem; font-weight: bold; transition: all 0.1s; }
        .camera-btn:hover { background: #2a2a2a; border-color: #888; }
        .camera-btn.active { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .camera-btn.blind { border-color: #ff8800; }
        
        .camera-main-view { display: flex; gap: 10px; }
        .camera-large { flex: 1; height: 200px; object-fit: cover; border-radius: 8px; border: 2px solid #333; filter: brightness(0.3) grayscale(0.4); }
        .camera-side { width: 150px; }
        .camera-side-btn { width: 100%; padding: 10px; margin-bottom: 8px; background: #1a1a1a; border: 2px solid #444; border-radius: 8px; color: #aaa; cursor: pointer; font-size: 0.8rem; }
        
        /* GAME OVER */
        .gameover-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 999; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .gameover-text { color: red; font-size: 4rem; font-weight: bold; text-shadow: 0 0 30px red; margin-bottom: 30px; }
        .jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: red; z-index: 998; display: none; justify-content: center; align-items: center; animation: flash 0.4s; }
        .jumpscare img { width: 400px; height: 400px; object-fit: cover; border-radius: 20px; border: 5px solid black; }
        @keyframes flash { 0%,100%{ background: red; } 50%{ background: darkred; } }
        
        /* MENU */
        .menu-screen { text-align: center; color: white; }
        .menu-title { font-size: 3rem; color: #ff4444; text-shadow: 0 0 20px red; margin-bottom: 30px; }
        .start-btn { padding: 15px 40px; background: #00ff88; border: none; border-radius: 15px; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #00aa55; }
        
        .hidden { display: none !important; }
        .warning-text { color: #ff4444; font-size: 1.2rem; text-align: center; margin: 10px 0; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{ opacity: 1; } 50%{ opacity: 0.5; } }
    </style>
</head>
<body>

<!-- HOVEDMENU -->
<div id="mainMenu" class="menu-screen">
    <div class="menu-title">👹 FIVE NIGHTS WITH RASMUS</div>
    <button class="start-btn" id="startGameBtn">START NAT 1</button>
    <p style="color: #666; margin-top: 30px;">Lav lektier for at overleve · Tjek kameraer</p>
</div>

<!-- SPIL CONTAINER -->
<div id="gameContainer" class="game-container hidden">
    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="night-display">🌙 NAT <span id="nightDisplay">1</span></div>
        <div class="time-display" id="timeDisplay">12:00 AM</div>
        <div class="power-display">
            <div>🔋 <span id="powerPercent">100</span>%</div>
            <div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
        </div>
    </div>
    
    <!-- KONTOR VISNING -->
    <div class="office-view" id="officeView">
        <img class="office-img" id="officeImg" src="https://imgur.com/nVo7Mr1.jpg" alt="Kontor">
        <div class="homework-overlay" id="homeworkOverlay">
            <span class="homework-text">📚 LAV LEKTIER 📚</span>
            <button class="homework-btn" id="homeworkBtn">KLIK FOR AT LAVE LEKTIER</button>
        </div>
        <img class="rasmus-office" id="rasmusOffice" src="https://imgur.com/G4CZuhM.jpg" alt="Rasmus">
    </div>
    
    <div class="warning-text hidden" id="warningText">⚠️ RASMUS ER I NÆRHEDEN! LAV LEKTIER! ⚠️</div>
    
    <!-- KAMERA PANEL -->
    <div id="cameraPanel" class="camera-panel hidden">
        <div class="camera-header">
            <span>📷 KAMERA SYSTEM</span>
            <button class="camera-side-btn" id="closeCameraBtn" style="width: auto; padding: 5px 15px;">LUK KAMERA</button>
        </div>
        <div class="camera-grid" id="cameraGrid"></div>
        <div class="camera-main-view">
            <img class="camera-large" id="cameraLarge" src="" alt="Kamera visning">
            <div class="camera-side">
                <button class="camera-side-btn" id="playSoundBtn">🔊 AFSPIL LYD</button>
                <div style="color: #888; font-size: 0.8rem; margin-top: 10px;">Brug lyd for at lokke Rasmus væk</div>
            </div>
        </div>
    </div>
</div>

<!-- GAME OVER -->
<div id="gameoverScreen" class="gameover-overlay">
    <div class="gameover-text">💀 GAME OVER 💀</div>
    <button class="start-btn" id="restartBtn" style="font-size: 1.3rem;">PRØV IGEN</button>
</div>

<!-- JUMP SCARE -->
<div id="jumpscareScreen" class="jumpscare">
    <img src="https://imgur.com/G4CZuhM.jpg" alt="Rasmus Jump Scare">
</div>

<script>
    // BILLEDER (MØRKE OG UHYGGELIGE)
    const OFFICE_IMG = 'https://imgur.com/nVo7Mr1.jpg';
    const CAMERA_IMGS = {
        'scene': 'https://imgur.com/r0Qx608.jpg',
        'gang1': 'https://imgur.com/RVy04Qn.jpg',
        'gang2': 'https://imgur.com/Lx6Qn86.jpg',
        'kantine': 'https://imgur.com/r0Qx608.jpg',
        'trappe': 'https://imgur.com/3iPixEm.jpg',
        'toilet': 'https://imgur.com/Ltatxyg.jpg',
        'biblio': 'https://imgur.com/YIfzseW.jpg',
        'udenfor': 'https://imgur.com/vcQPODA.jpg',
        'kontor': 'https://imgur.com/nllrJB0.jpg'
    };
    const RASMUS_IMG = 'https://imgur.com/G4CZuhM.jpg';
    
    // SPIL STATE
    let gameActive = false;
    let night = 1;
    let timeHour = 0;
    let power = 100;
    let cameraOpen = false;
    let rasmusPosition = 'scene';
    let rasmusInOffice = false;
    let doingHomework = false;
    let homeworkTimer = 0;
    let gameInterval = null;
    let rasmusInterval = null;
    let homeworkInterval = null;
    let soundCooldown = 0;
    
    // DOM
    const mainMenu = document.getElementById('mainMenu');
    const gameContainer = document.getElementById('gameContainer');
    const gameoverScreen = document.getElementById('gameoverScreen');
    const jumpscareScreen = document.getElementById('jumpscareScreen');
    const nightDisplay = document.getElementById('nightDisplay');
    const timeDisplay = document.getElementById('timeDisplay');
    const powerPercent = document.getElementById('powerPercent');
    const powerFill = document.getElementById('powerFill');
    const officeView = document.getElementById('officeView');
    const cameraPanel = document.getElementById('cameraPanel');
    const cameraGrid = document.getElementById('cameraGrid');
    const cameraLarge = document.getElementById('cameraLarge');
    const rasmusOffice = document.getElementById('rasmusOffice');
    const warningText = document.getElementById('warningText');
    const homeworkBtn = document.getElementById('homeworkBtn');
    const playSoundBtn = document.getElementById('playSoundBtn');
    
    const ROOMS = ['scene', 'gang1', 'gang2', 'kantine', 'trappe', 'toilet', 'biblio', 'udenfor', 'kontor'];
    
    function updateUI() {
        powerPercent.textContent = Math.floor(power);
        powerFill.style.width = power + '%';
        
        let hour = Math.floor(timeHour);
        let minute = Math.floor((timeHour - hour) * 60);
        let ampm = hour >= 12 ? 'PM' : 'AM';
        let displayHour = hour % 12;
        if (displayHour === 0) displayHour = 12;
        timeDisplay.textContent = `${displayHour}:${minute.toString().padStart(2,'0')} ${ampm}`;
        
        if (soundCooldown > 0) {
            playSoundBtn.textContent = `🔊 AFSPIL LYD (${soundCooldown}s)`;
            playSoundBtn.disabled = true;
        } else {
            playSoundBtn.textContent = '🔊 AFSPIL LYD';
            playSoundBtn.disabled = false;
        }
    }
    
    function drainPower() {
        let drain = 0.5;
        if (cameraOpen) drain += 1;
        power = Math.max(0, power - drain / 20);
        if (power <= 0) { cameraOpen = false; cameraPanel.classList.add('hidden'); }
        updateUI();
    }
    
    function moveRasmus() {
        if (!gameActive) return;
        
        let currentIndex = ROOMS.indexOf(rasmusPosition);
        let direction = Math.random() > 0.5 ? 1 : -1;
        let newIndex = Math.max(0, Math.min(ROOMS.length - 1, currentIndex + direction));
        rasmusPosition = ROOMS[newIndex];
        
        let nearOffice = (rasmusPosition === 'gang1' || rasmusPosition === 'gang2');
        warningText.classList.toggle('hidden', !nearOffice);
        
        if (nearOffice && Math.random() < 0.4 && !doingHomework) {
            rasmusInOffice = true;
            rasmusOffice.style.display = 'block';
            homeworkTimer = 5;
        }
        
        if (cameraOpen) updateCameraImage();
    }
    
    function updateCameraImage() {
        cameraLarge.src = CAMERA_IMGS[rasmusPosition] || CAMERA_IMGS['scene'];
    }
    
    function gameOver() {
        gameActive = false;
        clearInterval(gameInterval);
        clearInterval(rasmusInterval);
        clearInterval(homeworkInterval);
        jumpscareScreen.style.display = 'flex';
        setTimeout(() => { jumpscareScreen.style.display = 'none'; gameoverScreen.style.display = 'flex'; }, 800);
    }
    
    function winGame() {
        gameActive = false;
        clearInterval(gameInterval);
        clearInterval(rasmusInterval);
        clearInterval(homeworkInterval);
        alert('🎉 DU OVERLEVEDE NATTEN! 🎉\n\nKommer snart: Nat ' + (night + 1));
        gameContainer.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }
    
    function renderCameraGrid() {
        cameraGrid.innerHTML = '';
        ROOMS.forEach(room => {
            let btn = document.createElement('button');
            btn.className = 'camera-btn' + (room.includes('scene') || room.includes('toilet') || room.includes('biblio') || room.includes('kontor') ? ' blind' : '');
            btn.textContent = room.toUpperCase();
            btn.addEventListener('click', () => { cameraLarge.src = CAMERA_IMGS[room]; });
            cameraGrid.appendChild(btn);
        });
    }
    
    // EVENT LISTENERS
    document.getElementById('startGameBtn').addEventListener('click', () => { night = 1; startNight(); });
    document.getElementById('restartBtn').addEventListener('click', () => { gameoverScreen.style.display = 'none'; startNight(); });
    
    function startNight() {
        gameActive = true; timeHour = 0; power = 100; rasmusPosition = 'scene'; rasmusInOffice = false; doingHomework = false; cameraOpen = false;
        rasmusOffice.style.display = 'none'; cameraPanel.classList.add('hidden'); warningText.classList.add('hidden');
        
        mainMenu.classList.add('hidden'); gameContainer.classList.remove('hidden'); gameoverScreen.style.display = 'none';
        nightDisplay.textContent = night;
        
        updateUI(); renderCameraGrid();
        
        if (gameInterval) clearInterval(gameInterval);
        if (rasmusInterval) clearInterval(rasmusInterval);
        if (homeworkInterval) clearInterval(homeworkInterval);
        
        gameInterval = setInterval(() => {
            if (!gameActive) return;
            timeHour += 0.005;
            drainPower();
            if (soundCooldown > 0) soundCooldown--;
            if (timeHour >= 6) winGame();
            updateUI();
        }, 100);
        
        rasmusInterval = setInterval(() => moveRasmus(), 4000);
        
        homeworkInterval = setInterval(() => {
            if (!gameActive) return;
            if (rasmusInOffice && !doingHomework) { homeworkTimer--; if (homeworkTimer <= 0) gameOver(); }
            if (doingHomework) { rasmusInOffice = false; rasmusOffice.style.display = 'none'; }
        }, 1000);
    }
    
    homeworkBtn.addEventListener('click', () => { doingHomework = true; setTimeout(() => doingHomework = false, 2000); homeworkBtn.textContent = 'LAVER LEKTIER...'; setTimeout(() => homeworkBtn.textContent = 'KLIK FOR AT LAVE LEKTIER', 2000); });
    
    document.getElementById('closeCameraBtn').addEventListener('click', () => { cameraOpen = false; cameraPanel.classList.add('hidden'); });
    
    document.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if (e.key === 'c' || e.key === 'C') { cameraOpen = !cameraOpen; cameraPanel.classList.toggle('hidden', !cameraOpen); if (cameraOpen) updateCameraImage(); }
        if (e.key === 'h' || e.key === 'H') { doingHomework = true; homeworkBtn.textContent = 'LAVER LEKTIER...'; setTimeout(() => { doingHomework = false; homeworkBtn.textContent = 'KLIK FOR AT LAVE LEKTIER'; }, 2000); }
    });
    
    playSoundBtn.addEventListener('click', () => {
        if (soundCooldown > 0) return;
        soundCooldown = 15;
        let rooms = ROOMS.filter(r => r !== rasmusPosition);
        rasmusPosition = rooms[Math.floor(Math.random() * rooms.length)];
        if (cameraOpen) updateCameraImage();
    });
</script>
</body>
</html>
