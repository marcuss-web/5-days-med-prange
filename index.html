<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👹 Five Nights with Rasmus Prange 👹</title>
    <link rel="icon" href="data:,">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; padding: 20px; }
        
        .game-container { max-width: 900px; width: 100%; background: #1a1a2e; border-radius: 30px; padding: 25px; border: 4px solid #4a4a6e; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .night-display { font-size: 2rem; font-weight: bold; }
        .time-display { font-size: 2.5rem; font-weight: bold; }
        .power-display { font-size: 1.5rem; }
        .power-bar { width: 200px; height: 20px; background: #333; border-radius: 10px; overflow: hidden; border: 2px solid #00ff88; }
        .power-fill { height: 100%; background: #00ff88; width: 100%; transition: width 0.5s; }
        
        /* MAIN VIEW */
        .main-view { position: relative; margin-bottom: 20px; }
        .office-img { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; border: 3px solid #4a4a6e; }
        .camera-view { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; border: 3px solid #4a4a6e; }
        
        /* RASMUS I DØREN */
        .rasmus-door { position: absolute; bottom: 0; width: 120px; height: 120px; object-fit: cover; display: none; }
        .rasmus-left { left: 10px; }
        .rasmus-right { right: 10px; }
        
        /* KAMERA GRID */
        .camera-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .camera-btn { background: #2a2a4e; border: 2px solid #5a5a8e; border-radius: 10px; padding: 10px; color: white; cursor: pointer; text-align: center; font-size: 0.9rem; transition: all 0.2s; }
        .camera-btn:hover { background: #3a3a6e; border-color: #00ff88; }
        .camera-btn.active { border-color: #00ff88; box-shadow: 0 0 15px #00ff88; }
        
        /* KONTROL PANEL */
        .control-panel { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        .control-btn { flex: 1; padding: 15px; background: #2a2a4e; border: 3px solid #5a5a8e; border-radius: 15px; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 5px 0 #1a1a3e; }
        .control-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #1a1a3e; }
        .control-btn.active { background: #ff4444; border-color: #ff8888; }
        
        /* GAME OVER */
        .gameover-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 999; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .gameover-text { color: red; font-size: 5rem; font-weight: bold; text-shadow: 0 0 30px red; margin-bottom: 20px; }
        .jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: red; z-index: 998; display: none; justify-content: center; align-items: center; animation: flash 0.5s; }
        .jumpscare img { width: 400px; height: 400px; object-fit: cover; border-radius: 20px; border: 5px solid black; }
        @keyframes flash { 0%,100%{ background: red; } 50%{ background: darkred; } }
        
        /* MENU */
        .menu-screen { text-align: center; color: white; }
        .menu-title { font-size: 3.5rem; color: #ff4444; text-shadow: 0 0 20px red; margin-bottom: 40px; }
        .start-btn { padding: 20px 50px; background: #00ff88; border: none; border-radius: 20px; font-size: 1.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #00aa55; }
        .start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #00aa55; }
        
        .hidden { display: none !important; }
        .back-btn { background: #4a4a6e; border: none; color: white; padding: 8px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- HOVEDMENU -->
<div id="mainMenu" class="menu-screen">
    <div class="menu-title">👹 FIVE NIGHTS WITH RASMUS</div>
    <button class="start-btn" id="startGameBtn">START NAT 1</button>
    <p style="color: #888; margin-top: 30px;">Overlev fra 12AM til 6AM</p>
</div>

<!-- SPIL CONTAINER -->
<div id="gameContainer" class="game-container hidden">
    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="night-display">NAT <span id="nightDisplay">1</span></div>
        <div class="time-display" id="timeDisplay">12:00 AM</div>
        <div class="power-display">
            <div>🔋 <span id="powerPercent">100</span>%</div>
            <div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
        </div>
    </div>
    
    <!-- HOVED VISNING (KONTOR / KAMERA) -->
    <div class="main-view">
        <img class="office-img" id="officeView" src="https://imgur.com/nVo7Mr1.jpg" alt="Kontor">
        <img class="camera-view hidden" id="cameraView" src="" alt="Kamera">
        <img class="rasmus-door rasmus-left" id="rasmusLeft" src="https://imgur.com/G4CZuhM.jpg" alt="Rasmus">
        <img class="rasmus-door rasmus-right" id="rasmusRight" src="https://imgur.com/G4CZuhM.jpg" alt="Rasmus">
    </div>
    
    <!-- KAMERA GRID -->
    <div id="cameraPanel" class="hidden">
        <button class="back-btn" id="closeCameraBtn">◀ TILBAGE TIL KONTOR</button>
        <div class="camera-grid" id="cameraGrid"></div>
    </div>
    
    <!-- KONTROL PANEL -->
    <div class="control-panel">
        <button class="control-btn" id="leftDoorBtn">🚪 VENSTRE DØR</button>
        <button class="control-btn" id="cameraToggleBtn">📷 KAMERA</button>
        <button class="control-btn" id="rightDoorBtn">🚪 HØJRE DØR</button>
    </div>
</div>

<!-- GAME OVER -->
<div id="gameoverScreen" class="gameover-overlay">
    <div class="gameover-text">GAME OVER</div>
    <button class="start-btn" id="restartBtn" style="font-size: 1.5rem;">PRØV IGEN</button>
</div>

<!-- JUMP SCARE -->
<div id="jumpscareScreen" class="jumpscare">
    <img src="https://imgur.com/G4CZuhM.jpg" alt="Rasmus Jump Scare">
</div>

<script>
    // BILLEDER
    const OFFICE_IMG = 'https://imgur.com/nVo7Mr1.jpg';
    const CAMERA_IMGS = {
        'scene': 'https://imgur.com/r0Qx608.jpg',
        'gang1': 'https://imgur.com/RVy04Qn.jpg',
        'gang2': 'https://imgur.com/Lx6Qn86.jpg',
        'kantine': 'https://imgur.com/r0Qx608.jpg',
        'trappe': 'https://imgur.com/3iPixEm.jpg',
        'toilet': 'https://imgur.com/Ltatxyg.jpg',
        'biblio': 'https://imgur.com/YIfzseW.jpg',
        'udenfor': 'https://imgur.com/vcQPODA.jpg',
        'kontor': 'https://imgur.com/nllrJB0.jpg'
    };
    const RASMUS_IMG = 'https://imgur.com/G4CZuhM.jpg';
    
    // SPIL STATE
    let gameActive = false;
    let night = 1;
    let timeHour = 0;
    let timeMinute = 0;
    let power = 100;
    let leftDoorClosed = false;
    let rightDoorClosed = false;
    let cameraOpen = false;
    let rasmusPosition = 'scene';
    let rasmusAtLeftDoor = false;
    let rasmusAtRightDoor = false;
    let gameInterval = null;
    let rasmusInterval = null;
    
    // DOM
    const mainMenu = document.getElementById('mainMenu');
    const gameContainer = document.getElementById('gameContainer');
    const gameoverScreen = document.getElementById('gameoverScreen');
    const jumpscareScreen = document.getElementById('jumpscareScreen');
    const nightDisplay = document.getElementById('nightDisplay');
    const timeDisplay = document.getElementById('timeDisplay');
    const powerPercent = document.getElementById('powerPercent');
    const powerFill = document.getElementById('powerFill');
    const officeView = document.getElementById('officeView');
    const cameraView = document.getElementById('cameraView');
    const cameraPanel = document.getElementById('cameraPanel');
    const cameraGrid = document.getElementById('cameraGrid');
    const rasmusLeft = document.getElementById('rasmusLeft');
    const rasmusRight = document.getElementById('rasmusRight');
    const leftDoorBtn = document.getElementById('leftDoorBtn');
    const rightDoorBtn = document.getElementById('rightDoorBtn');
    const cameraToggleBtn = document.getElementById('cameraToggleBtn');
    
    // KAMERA RUM
    const ROOMS = ['scene', 'gang1', 'gang2', 'kantine', 'trappe', 'toilet', 'biblio', 'udenfor', 'kontor'];
    
    function updateUI() {
        powerPercent.textContent = Math.floor(power);
        powerFill.style.width = power + '%';
        
        let hour = Math.floor(timeHour);
        let minute = Math.floor((timeHour - hour) * 60);
        let ampm = hour >= 12 ? 'PM' : 'AM';
        let displayHour = hour % 12;
        if (displayHour === 0) displayHour = 12;
        timeDisplay.textContent = `${displayHour}:${minute.toString().padStart(2,'0')} ${ampm}`;
        
        leftDoorBtn.classList.toggle('active', leftDoorClosed);
        rightDoorBtn.classList.toggle('active', rightDoorClosed);
    }
    
    function drainPower() {
        let drain = 1;
        if (leftDoorClosed) drain += 2;
        if (rightDoorClosed) drain += 2;
        if (cameraOpen) drain += 1;
        power = Math.max(0, power - drain / 10);
        if (power <= 0) { leftDoorClosed = false; rightDoorClosed = false; cameraOpen = false; cameraPanel.classList.add('hidden'); officeView.classList.remove('hidden'); }
        updateUI();
    }
    
    function moveRasmus() {
        if (!gameActive) return;
        let currentIndex = ROOMS.indexOf(rasmusPosition);
        let direction = Math.random() > 0.5 ? 1 : -1;
        let newIndex = Math.max(0, Math.min(ROOMS.length - 1, currentIndex + direction));
        rasmusPosition = ROOMS[newIndex];
        
        rasmusAtLeftDoor = (rasmusPosition === 'gang1' && Math.random() < 0.3);
        rasmusAtRightDoor = (rasmusPosition === 'gang2' && Math.random() < 0.3);
        
        rasmusLeft.style.display = rasmusAtLeftDoor && !leftDoorClosed ? 'block' : 'none';
        rasmusRight.style.display = rasmusAtRightDoor && !rightDoorClosed ? 'block' : 'none';
        
        if ((rasmusAtLeftDoor && !leftDoorClosed) || (rasmusAtRightDoor && !rightDoorClosed)) {
            if (!cameraOpen) gameOver();
        }
    }
    
    function gameOver() {
        gameActive = false;
        clearInterval(gameInterval);
        clearInterval(rasmusInterval);
        jumpscareScreen.style.display = 'flex';
        setTimeout(() => { jumpscareScreen.style.display = 'none'; gameoverScreen.style.display = 'flex'; }, 800);
    }
    
    function winGame() {
        gameActive = false;
        clearInterval(gameInterval);
        clearInterval(rasmusInterval);
        alert('🎉 DU OVERLEVEDE NATTEN! 🎉\n\nKommer snart: Nat ' + (night + 1));
        gameContainer.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }
    
    function renderCameraGrid() {
        cameraGrid.innerHTML = '';
        ROOMS.forEach(room => {
            let btn = document.createElement('button');
            btn.className = 'camera-btn';
            btn.textContent = room.toUpperCase();
            btn.addEventListener('click', () => { cameraView.src = CAMERA_IMGS[room]; });
            cameraGrid.appendChild(btn);
        });
    }
    
    // EVENT LISTENERS
    document.getElementById('startGameBtn').addEventListener('click', () => {
        night = 1;
        startNight();
    });
    
    document.getElementById('restartBtn').addEventListener('click', () => {
        gameoverScreen.style.display = 'none';
        startNight();
    });
    
    function startNight() {
        gameActive = true;
        timeHour = 0;
        power = 100;
        rasmusPosition = 'scene';
        leftDoorClosed = false; rightDoorClosed = false; cameraOpen = false;
        rasmusLeft.style.display = 'none'; rasmusRight.style.display = 'none';
        cameraPanel.classList.add('hidden'); officeView.classList.remove('hidden');
        
        mainMenu.classList.add('hidden');
        gameContainer.classList.remove('hidden');
        gameoverScreen.style.display = 'none';
        nightDisplay.textContent = night;
        
        updateUI();
        renderCameraGrid();
        
        if (gameInterval) clearInterval(gameInterval);
        if (rasmusInterval) clearInterval(rasmusInterval);
        
        gameInterval = setInterval(() => {
            if (!gameActive) return;
            timeHour += 0.01;
            drainPower();
            if (timeHour >= 6) winGame();
            updateUI();
        }, 100);
        
        rasmusInterval = setInterval(() => moveRasmus(), 3000);
    }
    
    leftDoorBtn.addEventListener('click', () => { if (power > 0) { leftDoorClosed = !leftDoorClosed; if (!leftDoorClosed) rasmusLeft.style.display = 'none'; updateUI(); } });
    rightDoorBtn.addEventListener('click', () => { if (power > 0) { rightDoorClosed = !rightDoorClosed; if (!rightDoorClosed) rasmusRight.style.display = 'none'; updateUI(); } });
    
    cameraToggleBtn.addEventListener('click', () => {
        cameraOpen = !cameraOpen;
        cameraPanel.classList.toggle('hidden', !cameraOpen);
        officeView.classList.toggle('hidden', cameraOpen);
        cameraView.classList.toggle('hidden', !cameraOpen);
        cameraToggleBtn.classList.toggle('active', cameraOpen);
        if (!cameraOpen) cameraView.src = '';
    });
    
    document.getElementById('closeCameraBtn').addEventListener('click', () => { cameraOpen = false; cameraPanel.classList.add('hidden'); officeView.classList.remove('hidden'); cameraToggleBtn.classList.remove('active'); });
</script>
</body>
</html>
