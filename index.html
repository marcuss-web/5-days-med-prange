<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👹 Five Nights with Epstein 👹</title>
    <link rel="icon" href="data:,">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; padding: 20px; }
        
        /* MENU - PRÆCIS SOM EPSTEIN */
        .menu-screen { position: relative; width: 100%; max-width: 900px; height: 550px; background: url('https://i.imgur.com/8vQZQ5b.jpg') center/cover; border-radius: 15px; overflow: hidden; border: 3px solid #444; }
        .menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .menu-title { font-size: 3.5rem; color: #ff0000; text-shadow: 0 0 30px red; margin-bottom: 30px; font-weight: bold; letter-spacing: 3px; }
        .menu-epstein { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; border: 3px solid red; box-shadow: 0 0 40px red; margin-bottom: 30px; }
        .start-btn { padding: 12px 40px; background: #cc0000; border: none; border-radius: 8px; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #660000; transition: all 0.1s; }
        .start-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #660000; }
        
        /* SPIL CONTAINER */
        .game-container { max-width: 900px; width: 100%; background: #0a0a0a; border-radius: 15px; padding: 12px; border: 3px solid #333; }
        
        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; color: #aaa; font-size: 1.2rem; }
        .night-text { background: #1a1a1a; padding: 4px 12px; border-radius: 6px; }
        .time-text { font-size: 1.8rem; color: #00ff00; text-shadow: 0 0 8px #00ff00; }
        .power-container { display: flex; align-items: center; gap: 8px; }
        .power-text { color: #ff4444; }
        .power-bar { width: 100px; height: 12px; background: #222; border-radius: 6px; overflow: hidden; }
        .power-fill { height: 100%; background: #ff4444; width: 100%; }
        
        /* KONTOR - PRÆCIS SOM EPSTEIN */
        .office-container { position: relative; margin-bottom: 8px; }
        .office-bg { width: 100%; height: 320px; object-fit: cover; border-radius: 8px; border: 2px solid #444; filter: brightness(0.45); }
        
        /* DØR I MIDTEN */
        .door-center { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(20,20,20,0.8); padding: 8px 20px; border-radius: 30px; border: 1px solid #555; }
        .door-btn { background: #2a2a2a; border: 2px solid #555; color: white; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .door-btn.active { background: #00aa00; border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .light-btn { background: #2a2a2a; border: 2px solid #555; color: white; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .light-btn.active { background: #ff8800; border-color: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        
        .epstein-door { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); width: 110px; height: 110px; object-fit: cover; border-radius: 8px; border: 2px solid red; box-shadow: 0 0 20px red; display: none; }
        
        /* KAMERA PANEL */
        .camera-panel { background: #0a0a0a; border: 2px solid #333; border-radius: 8px; padding: 12px; margin-top: 8px; }
        .camera-map { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .camera-room { background: #1a1a1a; border: 2px solid #444; border-radius: 6px; padding: 12px 4px; color: #aaa; text-align: center; font-size: 0.75rem; cursor: pointer; position: relative; }
        .camera-room.blind { border-color: #ff8800; }
        .camera-room.active { border-color: #00ff00; box-shadow: 0 0 8px #00ff00; }
        
        .camera-view { display: flex; gap: 12px; }
        .camera-image { flex: 1; height: 170px; object-fit: cover; border-radius: 6px; border: 2px solid #444; filter: brightness(0.4); }
        .camera-controls { width: 130px; }
        .camera-btn { width: 100%; padding: 8px; margin-bottom: 6px; background: #222; border: 2px solid #444; border-radius: 6px; color: white; cursor: pointer; font-size: 0.8rem; }
        
        .hidden { display: none !important; }
        
        /* GAME OVER & JUMP SCARE */
        .gameover-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 999; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .gameover-text { color: red; font-size: 4rem; margin-bottom: 30px; text-shadow: 0 0 20px red; }
        .jumpscare { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: red; z-index: 998; display: none; justify-content: center; align-items: center; animation: flash 0.3s; }
        .jumpscare img { width: 400px; height: 400px; object-fit: cover; border-radius: 20px; }
        @keyframes flash { 0%,100%{ background: red; } 50%{ background: darkred; } }
    </style>
</head>
<body>

<!-- MENU -->
<div id="menuScreen" class="menu-screen">
    <div class="menu-overlay">
        <div class="menu-title">FIVE NIGHTS</div>
        <img class="menu-epstein" src="https://i.imgur.com/8vQZQ5b.jpg" alt="Epstein" id="menuEpsteinImg">
        <div class="menu-title" style="font-size: 2.8rem;">WITH EPSTEIN</div>
        <button class="start-btn" id="startBtn">START NAT 1</button>
    </div>
</div>

<!-- SPIL -->
<div id="gameContainer" class="game-container hidden">
    <div class="top-bar">
        <div class="night-text">NAT <span id="nightDisplay">1</span></div>
        <div class="time-text" id="timeDisplay">12:00 AM</div>
        <div class="power-container">
            <span class="power-text">🔋 <span id="powerPercent">100</span>%</span>
            <div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
        </div>
    </div>
    
    <!-- KONTOR -->
    <div class="office-container">
        <img class="office-bg" src="https://i.imgur.com/8vQZQ5b.jpg" alt="Office" id="officeImg">
        <div class="door-center">
            <button class="door-btn" id="doorBtn">🚪 DØR</button>
            <button class="light-btn" id="lightBtn">💡 LYS</button>
        </div>
        <img class="epstein-door" src="https://i.imgur.com/8vQZQ5b.jpg" alt="Epstein" id="epsteinDoor">
    </div>
    
    <!-- KAMERA -->
    <div id="cameraPanel" class="camera-panel hidden">
        <div class="camera-map" id="cameraMap"></div>
        <div class="camera-view">
            <img class="camera-image" id="cameraImage" src="">
            <div class="camera-controls">
                <button class="camera-btn" id="closeCameraBtn">LUK</button>
                <button class="camera-btn" id="playSoundBtn">🔊 LYD</button>
            </div>
        </div>
    </div>
</div>

<!-- GAME OVER -->
<div id="gameoverScreen" class="gameover-screen">
    <div class="gameover-text">GAME OVER</div>
    <button class="start-btn" id="restartBtn">PRØV IGEN</button>
</div>

<!-- JUMP SCARE -->
<div id="jumpscareScreen" class="jumpscare">
    <img src="https://i.imgur.com/8vQZQ5b.jpg" alt="Epstein Jump" id="jumpscareImg">
</div>

<script>
    // ========== EPSTEIN SPIL - 1:1 KOPI ==========
    
    // BILLEDER (placeholder - du kan erstatte med dine egne)
    const IMAGES = {
        menu: 'https://i.imgur.com/8vQZQ5b.jpg',
        office: 'https://i.imgur.com/8vQZQ5b.jpg',
        epstein: 'https://i.imgur.com/8vQZQ5b.jpg',
        scene: 'https://i.imgur.com/8vQZQ5b.jpg',
        gang1: 'https://i.imgur.com/8vQZQ5b.jpg',
        gang2: 'https://i.imgur.com/8vQZQ5b.jpg',
        kantine: 'https://i.imgur.com/8vQZQ5b.jpg',
        trappe: 'https://i.imgur.com/8vQZQ5b.jpg',
        toilet: 'https://i.imgur.com/8vQZQ5b.jpg',
        biblio: 'https://i.imgur.com/8vQZQ5b.jpg',
        udenfor: 'https://i.imgur.com/8vQZQ5b.jpg',
        kontor: 'https://i.imgur.com/8vQZQ5b.jpg'
    };
    
    // Sæt billeder
    document.getElementById('menuEpsteinImg').src = IMAGES.epstein;
    document.getElementById('officeImg').src = IMAGES.office;
    document.getElementById('epsteinDoor').src = IMAGES.epstein;
    document.getElementById('jumpscareImg').src = IMAGES.epstein;
    
    // SPIL STATE
    let gameActive = false, night = 1, timeHour = 0, power = 100, cameraOpen = false;
    let epsteinRoom = 'scene', doorClosed = false, lightOn = false;
    let gameInterval, epsteinInterval, soundCooldown = 0;
    
    const ROOMS = ['scene', 'gang1', 'gang2', 'kantine', 'trappe', 'toilet', 'biblio', 'udenfor', 'kontor'];
    const ROOM_NAMES = { scene:'SCENE', gang1:'GANG 1', gang2:'GANG 2', kantine:'KANTINE', trappe:'TRAPPE', toilet:'TOILET', biblio:'BIBLIO', udenfor:'UDENFOR', kontor:'KONTOR' };
    const BLIND_ROOMS = ['scene', 'toilet', 'biblio', 'kontor'];
    
    const menuScreen = document.getElementById('menuScreen'), gameContainer = document.getElementById('gameContainer');
    const gameoverScreen = document.getElementById('gameoverScreen'), jumpscareScreen = document.getElementById('jumpscareScreen');
    const nightDisplay = document.getElementById('nightDisplay'), timeDisplay = document.getElementById('timeDisplay');
    const powerPercent = document.getElementById('powerPercent'), powerFill = document.getElementById('powerFill');
    const cameraPanel = document.getElementById('cameraPanel'), cameraMap = document.getElementById('cameraMap');
    const cameraImage = document.getElementById('cameraImage'), epsteinDoor = document.getElementById('epsteinDoor');
    const doorBtn = document.getElementById('doorBtn'), lightBtn = document.getElementById('lightBtn');
    
    function updateUI() {
        powerPercent.textContent = Math.floor(power); powerFill.style.width = power + '%';
        let h = Math.floor(timeHour), m = Math.floor((timeHour - h) * 60);
        timeDisplay.textContent = `${h % 12 || 12}:${m.toString().padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
        doorBtn.classList.toggle('active', doorClosed); lightBtn.classList.toggle('active', lightOn);
    }
    
    function drainPower() { 
        let d = 0.5; if (doorClosed) d += 1.5; if (lightOn) d += 0.5; if (cameraOpen) d += 0.8; 
        power = Math.max(0, power - d/12); if (power <= 0) { doorClosed = lightOn = cameraOpen = false; cameraPanel.classList.add('hidden'); } 
        updateUI(); 
    }
    
    function moveEpstein() {
        if (!gameActive) return;
        let idx = ROOMS.indexOf(epsteinRoom), dir = Math.random() > 0.5 ? 1 : -1;
        epsteinRoom = ROOMS[Math.max(0, Math.min(ROOMS.length-1, idx + dir))];
        
        let atDoor = (epsteinRoom === 'gang1' || epsteinRoom === 'gang2');
        epsteinDoor.style.display = (atDoor && !doorClosed) ? 'block' : 'none';
        
        if (atDoor && !doorClosed && !cameraOpen) gameOver();
        if (cameraOpen) cameraImage.src = IMAGES[epsteinRoom] || IMAGES.scene;
    }
    
    function gameOver() { 
        gameActive = false; clearInterval(gameInterval); clearInterval(epsteinInterval); 
        jumpscareScreen.style.display = 'flex'; 
        setTimeout(() => { jumpscareScreen.style.display = 'none'; gameoverScreen.style.display = 'flex'; }, 800); 
    }
    
    function renderCameraMap() {
        cameraMap.innerHTML = '';
        ROOMS.forEach(room => {
            let btn = document.createElement('div'); 
            btn.className = 'camera-room' + (BLIND_ROOMS.includes(room) ? ' blind' : '');
            btn.textContent = ROOM_NAMES[room];
            btn.addEventListener('click', () => { cameraImage.src = IMAGES[room] || IMAGES.scene; });
            cameraMap.appendChild(btn);
        });
    }
    
    document.getElementById('startBtn').addEventListener('click', () => { night = 1; startNight(); });
    document.getElementById('restartBtn').addEventListener('click', () => { gameoverScreen.style.display = 'none'; startNight(); });
    
    function startNight() {
        gameActive = true; timeHour = 0; power = 100; epsteinRoom = 'scene'; 
        doorClosed = lightOn = cameraOpen = false; epsteinDoor.style.display = 'none'; cameraPanel.classList.add('hidden');
        menuScreen.classList.add('hidden'); gameContainer.classList.remove('hidden'); gameoverScreen.style.display = 'none';
        nightDisplay.textContent = night; updateUI(); renderCameraMap();
        if (gameInterval) clearInterval(gameInterval); if (epsteinInterval) clearInterval(epsteinInterval);
        gameInterval = setInterval(() => { if (!gameActive) return; timeHour += 0.005; drainPower(); if (soundCooldown > 0) soundCooldown--; if (timeHour >= 6) { gameActive = false; alert('🎉 DU OVERLEVEDE NATTEN! 🎉'); menuScreen.classList.remove('hidden'); gameContainer.classList.add('hidden'); } updateUI(); }, 100);
        epsteinInterval = setInterval(() => moveEpstein(), 4000);
    }
    
    doorBtn.addEventListener('click', () => { if (power > 0) { doorClosed = !doorClosed; if (doorClosed) epsteinDoor.style.display = 'none'; updateUI(); } });
    lightBtn.addEventListener('click', () => { lightOn = !lightOn; updateUI(); });
    document.addEventListener('keydown', (e) => { if (!gameActive) return; if (e.key === 'c' || e.key === 'C') { cameraOpen = !cameraOpen; cameraPanel.classList.toggle('hidden', !cameraOpen); if (cameraOpen) cameraImage.src = IMAGES[epsteinRoom] || IMAGES.scene; } });
    document.getElementById('closeCameraBtn').addEventListener('click', () => { cameraOpen = false; cameraPanel.classList.add('hidden'); });
    document.getElementById('playSoundBtn').addEventListener('click', () => { if (soundCooldown > 0) return; soundCooldown = 15; let rooms = ROOMS.filter(r => r !== epsteinRoom); epsteinRoom = rooms[Math.floor(Math.random() * rooms.length)]; if (cameraOpen) cameraImage.src = IMAGES[epsteinRoom] || IMAGES.scene; });
</script>
</body>
</html>
