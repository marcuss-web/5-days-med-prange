<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌙 Nattevagten · Klik & Slip</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0b0e14 0%, #1a1f2c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
            margin: 0;
            color: #e0e0e0;
        }

        .game-wrapper {
            max-width: 550px;
            width: 100%;
            background: rgba(20, 30, 40, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 28px 22px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.08);
            border: 1px solid rgba(255,215,0,0.2);
        }

        /* Header med point og tid */
        .stats-panel {
            background: rgba(0,0,0,0.35);
            border-radius: 100px;
            padding: 18px 28px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
        }

        .points-container {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .points-label {
            font-size: 1rem;
            font-weight: 500;
            color: #b0b8c5;
            letter-spacing: 0.5px;
        }

        .points-value {
            font-size: 2.8rem;
            font-weight: 800;
            color: #ffd966;
            line-height: 1;
            text-shadow: 0 2px 8px rgba(255,220,100,0.4);
        }

        .timer-container {
            text-align: right;
        }

        .timer-label {
            font-size: 0.8rem;
            color: #8a94a3;
            letter-spacing: 1px;
        }

        .timer-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e0e0e0;
            line-height: 1.1;
        }

        /* Hoved-klik-område */
        .click-area {
            background: radial-gradient(circle at 30% 20%, #2a3a4a, #0f1a24);
            border-radius: 180px;
            padding: 28px 15px 25px;
            margin-bottom: 30px;
            text-align: center;
            border: 2px solid #ffd966;
            box-shadow: 0 15px 0 #7a5512, 0 25px 35px rgba(0,0,0,0.5);
            transition: all 0.05s ease;
            cursor: pointer;
        }

        .click-area:active {
            transform: translateY(6px);
            box-shadow: 0 9px 0 #7a5512, 0 20px 30px rgba(0,0,0,0.5);
        }

        .click-emoji {
            font-size: 6.5rem;
            line-height: 1;
            filter: drop-shadow(0 8px 12px black);
            margin-bottom: 5px;
        }

        .click-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 3px 0 #7a5512;
            letter-spacing: 1px;
        }

        .click-sub {
            font-size: 0.9rem;
            color: #a0b0c0;
            margin-top: 8px;
        }

        /* Opgraderinger */
        .upgrades-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upgrades-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .upgrade-card {
            background: rgba(15, 25, 35, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 8px 16px 8px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #3a5068;
            box-shadow: 0 5px 0 #0f1a24;
            transition: all 0.1s;
        }

        .upgrade-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .upgrade-icon {
            font-size: 2.2rem;
            width: 45px;
            text-align: center;
        }

        .upgrade-details h4 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f0e6d2;
        }

        .upgrade-details p {
            font-size: 0.8rem;
            color: #a0b0c0;
        }

        .upgrade-action {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upgrade-cost {
            font-weight: 700;
            color: #ffd966;
            background: #1e2a36;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 1rem;
        }

        .buy-btn {
            background: #3d6b2e;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #1f3a16;
            transition: all 0.1s;
            border: 1px solid #6da34d;
        }

        .buy-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f3a16;
        }

        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 3px 0 #1f3a16;
            background: #4a4a4a;
            border-color: #666;
        }

        .reset-area {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #5a4a3a;
            color: #a09080;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s;
        }

        .reset-btn:hover {
            background: rgba(255,255,255,0.05);
            color: #d0c0b0;
        }

        /* Achievement toast */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            color: #ffd966;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-left: 6px solid #ffd966;
            z-index: 999;
            animation: slideUp 2.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
        }

        .footer-note {
            text-align: center;
            margin-top: 15px;
            color: #6a7a8a;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <!-- Stats -->
    <div class="stats-panel">
        <div class="points-container">
            <span class="points-label">🔋</span>
            <span class="points-value" id="pointsDisplay">0</span>
        </div>
        <div class="timer-container">
            <div class="timer-label">OVERLEVET</div>
            <div class="timer-value" id="timerDisplay">00:00</div>
        </div>
    </div>

    <!-- Klik område -->
    <div class="click-area" id="clickArea">
        <div class="click-emoji">👁️</div>
        <div class="click-text">HOLD DIG VÅGEN</div>
        <div class="click-sub">+<span id="clickPower">1</span> point · Klik her</div>
    </div>

    <!-- Opgraderinger -->
    <div class="upgrades-title">
        <span>🛠️ OPGRADERINGER</span>
        <span style="font-size: 0.8rem; opacity: 0.7;">(passiv indkomst)</span>
    </div>
    <div class="upgrades-list">
        <!-- Kaffe -->
        <div class="upgrade-card">
            <div class="upgrade-info">
                <span class="upgrade-icon">☕</span>
                <div class="upgrade-details">
                    <h4>Stærkere Kaffe</h4>
                    <p>+1 point per klik (Niv. <span id="coffeeLevel">1</span>)</p>
                </div>
            </div>
            <div class="upgrade-action">
                <span class="upgrade-cost" id="coffeeCost">15</span>
                <button class="buy-btn" id="buyCoffeeBtn">KØB</button>
            </div>
        </div>
        <!-- Radio -->
        <div class="upgrade-card">
            <div class="upgrade-info">
                <span class="upgrade-icon">📻</span>
                <div class="upgrade-details">
                    <h4>Radio</h4>
                    <p>+2 point/sek</p>
                </div>
            </div>
            <div class="upgrade-action">
                <span class="upgrade-cost" id="radioCost">30</span>
                <button class="buy-btn" id="buyRadioBtn">KØB</button>
            </div>
        </div>
        <!-- Flere skærme -->
        <div class="upgrade-card">
            <div class="upgrade-info">
                <span class="upgrade-icon">🖥️</span>
                <div class="upgrade-details">
                    <h4>Ekstra Skærm</h4>
                    <p>+8 point/sek</p>
                </div>
            </div>
            <div class="upgrade-action">
                <span class="upgrade-cost" id="screenCost">120</span>
                <button class="buy-btn" id="buyScreenBtn">KØB</button>
            </div>
        </div>
        <!-- Dør -->
        <div class="upgrade-card">
            <div class="upgrade-info">
                <span class="upgrade-icon">🚪</span>
                <div class="upgrade-details">
                    <h4>Forstærket Dør</h4>
                    <p>+20 point/sek</p>
                </div>
            </div>
            <div class="upgrade-action">
                <span class="upgrade-cost" id="doorCost">300</span>
                <button class="buy-btn" id="buyDoorBtn">KØB</button>
            </div>
        </div>
    </div>

    <div class="reset-area">
        <button class="reset-btn" id="resetBtn">🔄 Nulstil fremskridt</button>
    </div>
    <div class="footer-note">💾 Spillet gemmer automatisk</div>
</div>

<script>
    (function(){
        "use strict";

        // ----- Spil State -----
        let points = 0;
        let survivedSeconds = 0;
        let clickMultiplier = 1;          // Niveau for kaffe
        let hasRadio = false;
        let hasScreen = false;
        let hasDoor = false;

        // Opgraderings-priser
        const COFFEE_BASE_COST = 15;
        const RADIO_COST = 30;
        const SCREEN_COST = 120;
        const DOOR_COST = 300;

        // DOM Elementer
        const pointsDisplay = document.getElementById('pointsDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const clickPowerSpan = document.getElementById('clickPower');
        const coffeeLevelSpan = document.getElementById('coffeeLevel');
        const coffeeCostSpan = document.getElementById('coffeeCost');
        const buyCoffeeBtn = document.getElementById('buyCoffeeBtn');
        const buyRadioBtn = document.getElementById('buyRadioBtn');
        const buyScreenBtn = document.getElementById('buyScreenBtn');
        const buyDoorBtn = document.getElementById('buyDoorBtn');
        const clickArea = document.getElementById('clickArea');
        const resetBtn = document.getElementById('resetBtn');

        // Intervaller
        let gameInterval = null;
        let saveInterval = null;

        // ----- Hjælpefunktioner -----
        function showToast(text) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // ----- Opdater UI -----
        function updateUI() {
            // Point
            pointsDisplay.textContent = Math.floor(points);

            // Timer
            const mins = Math.floor(survivedSeconds / 60);
            const secs = survivedSeconds % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            // Kaffe (Klik-power)
            clickPowerSpan.textContent = clickMultiplier;
            coffeeLevelSpan.textContent = clickMultiplier;
            const nextCoffeeCost = COFFEE_BASE_COST + (clickMultiplier - 1) * 8;
            coffeeCostSpan.textContent = nextCoffeeCost;
            buyCoffeeBtn.disabled = (points < nextCoffeeCost);

            // Radio
            const radioCostSpan = document.getElementById('radioCost');
            if (!hasRadio) {
                radioCostSpan.textContent = RADIO_COST;
                buyRadioBtn.disabled = (points < RADIO_COST);
                buyRadioBtn.textContent = 'KØB';
            } else {
                radioCostSpan.textContent = '—';
                buyRadioBtn.disabled = true;
                buyRadioBtn.textContent = 'Ejet';
            }

            // Skærm
            const screenCostSpan = document.getElementById('screenCost');
            if (!hasScreen) {
                screenCostSpan.textContent = SCREEN_COST;
                buyScreenBtn.disabled = (points < SCREEN_COST);
                buyScreenBtn.textContent = 'KØB';
            } else {
                screenCostSpan.textContent = '—';
                buyScreenBtn.disabled = true;
                buyScreenBtn.textContent = 'Ejet';
            }

            // Dør
            const doorCostSpan = document.getElementById('doorCost');
            if (!hasDoor) {
                doorCostSpan.textContent = DOOR_COST;
                buyDoorBtn.disabled = (points < DOOR_COST);
                buyDoorBtn.textContent = 'KØB';
            } else {
                doorCostSpan.textContent = '—';
                buyDoorBtn.disabled = true;
                buyDoorBtn.textContent = 'Ejet';
            }
        }

        // ----- Tilføj point (sikrer UI opdatering)-----
        function addPoints(amount) {
            points += amount;
            updateUI();
        }

        // ----- Beregn passiv indkomst -----
        function calculatePassiveIncome() {
            let income = 0;
            if (hasRadio) income += 2;
            if (hasScreen) income += 8;
            if (hasDoor) income += 20;
            return income;
        }

        // ----- Game Loop (hvert sekund) -----
        function gameTick() {
            if (!gameInterval) return;

            // Overlevelsestid
            survivedSeconds++;
            
            // Passiv indkomst
            const passive = calculatePassiveIncome();
            if (passive > 0) {
                points += passive;
            }

            // Gemmer spillet automatisk hvert 10. sekund (for at være sikker)
            // ... gøres i saveInterval

            updateUI();
        }

        // ----- Gem / Load -----
        const STORAGE_KEY = 'nattevagten_save_v1';

        function saveGame() {
            const saveData = {
                points: points,
                survived: survivedSeconds,
                clickMult: clickMultiplier,
                radio: hasRadio,
                screen: hasScreen,
                door: hasDoor
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));
        }

        function loadGame() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;

            try {
                const data = JSON.parse(raw);
                points = data.points || 0;
                survivedSeconds = data.survived || 0;
                clickMultiplier = data.clickMult || 1;
                hasRadio = data.radio || false;
                hasScreen = data.screen || false;
                hasDoor = data.door || false;
            } catch (e) {
                console.warn("Kunne ikke loade save, starter frisk.");
            }
            updateUI();
        }

        // ----- Nulstil spil -----
        function resetGame() {
            if (confirm('Er du sikker på, at du vil slette alt? Dette kan ikke fortrydes.')) {
                points = 0;
                survivedSeconds = 0;
                clickMultiplier = 1;
                hasRadio = false;
                hasScreen = false;
                hasDoor = false;

                updateUI();
                saveGame();
                showToast('🔄 Spillet er nulstillet');
            }
        }

        // ----- Køb opgraderinger -----
        function buyCoffee() {
            const cost = COFFEE_BASE_COST + (clickMultiplier - 1) * 8;
            if (points >= cost) {
                points -= cost;
                clickMultiplier++;
                updateUI();
                saveGame();
                showToast(`☕ Kaffe niveau ${clickMultiplier}!`);
            }
        }

        function buyRadio() {
            if (!hasRadio && points >= RADIO_COST) {
                points -= RADIO_COST;
                hasRadio = true;
                updateUI();
                saveGame();
                showToast('📻 Radio købt! +2 point/sek');
            }
        }

        function buyScreen() {
            if (!hasScreen && points >= SCREEN_COST) {
                points -= SCREEN_COST;
                hasScreen = true;
                updateUI();
                saveGame();
                showToast('🖥️ Ekstra skærm købt! +8 point/sek');
            }
        }

        function buyDoor() {
            if (!hasDoor && points >= DOOR_COST) {
                points -= DOOR_COST;
                hasDoor = true;
                updateUI();
                saveGame();
                showToast('🚪 Forstærket dør købt! +20 point/sek');
            }
        }

        // ----- Klik på hovedområdet -----
        function handleClick() {
            addPoints(clickMultiplier);
            saveGame(); // Gem efter hver klik (føles responsivt)
            // Lille visuel feedback
            clickArea.style.transform = 'translateY(6px)';
            clickArea.style.boxShadow = '0 9px 0 #7a5512, 0 20px 30px rgba(0,0,0,0.5)';
            setTimeout(() => {
                clickArea.style.transform = '';
                clickArea.style.boxShadow = '0 15px 0 #7a5512, 0 25px 35px rgba(0,0,0,0.5)';
            }, 80);
        }

        // ----- Init -----
        function init() {
            // Load først
            loadGame();
            
            // Starter timere
            if (gameInterval) clearInterval(gameInterval);
            if (saveInterval) clearInterval(saveInterval);
            
            gameInterval = setInterval(() => gameTick(), 1000);
            saveInterval = setInterval(() => saveGame(), 8000); // Gemmer ofte

            // Event listeners
            clickArea.addEventListener('click', handleClick);
            buyCoffeeBtn.addEventListener('click', buyCoffee);
            buyRadioBtn.addEventListener('click', buyRadio);
            buyScreenBtn.addEventListener('click', buyScreen);
            buyDoorBtn.addEventListener('click', buyDoor);
            resetBtn.addEventListener('click', resetGame);

            updateUI();
            showToast('🌙 God vagt! Hold dig vågen.');
        }

        // Start spillet
        init();
    })();
</script>
</body>
</html>
